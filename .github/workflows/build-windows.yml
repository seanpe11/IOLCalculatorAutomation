name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # selenium resolves its browser backends lazily via importlib, so
      # PyInstaller's static analysis misses them. --collect-all pulls in the
      # hidden submodules AND the bundled selenium-manager.exe that fetches
      # chromedriver at runtime. openpyxl is likewise imported by name by pandas.
      - name: Build one-file EXE
        run: >
          pyinstaller --onefile --windowed
          --collect-all selenium
          --hidden-import openpyxl
          --name IOLCalculator main.py

      # Lets you download and test the build from the Actions run
      # without having to cut a release first.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: IOLCalculator-windows
          path: dist/IOLCalculator.exe

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/IOLCalculator.exe
